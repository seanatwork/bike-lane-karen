        var tierCounts = {"high": 6, "medium_high": 1, "medium": 2, "clean": 11};

        function updateSummary() {
            var shown = Object.keys(tierVisible).filter(function(t) { return tierVisible[t]; });

        function initLayers() {
            layerMap = {"high": feature_group_68f01bc63a0e5b9c14ee39bc87ab7860, "medium_high": feature_group_0f384fb6515d15c323b3bbf71b3c8aab, "medium": feature_group_4caac1be3cf93a2d6ece90b8ea7f5dda, "clean": feature_group_ef7788fdca85587aa6e7e5f574c4ca02};
            leafletMap = map_5ae9c22941e706486bc0b0a39258165a;
            updateSummary();
        }

        function toggleTier(tier) {
            tierVisible[tier] = !tierVisible[tier];
            document.getElementById('btn-' + tier).classList.toggle('active');
            var layer = layerMap[tier];
            if (tierVisible[tier]) {
                if (!leafletMap.hasLayer(layer)) leafletMap.addLayer(layer);
            } else {
                if (leafletMap.hasLayer(layer)) leafletMap.removeLayer(layer);
            }
            updateSummary();
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initLayers, 1000);
        });
    </script>
