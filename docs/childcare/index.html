        var layerMap = null;
        var leafletMap = null;
        var tierCounts = {"high": 6, "medium_high": 1, "medium": 2, "clean": 11};

        function updateSummary() {
            var shown = Object.keys(tierVisible).filter(function(t) { return tierVisible[t]; });
            var total = shown.reduce(function(s, t) { return s + (tierCounts[t] || 0); }, 0);
            document.getElementById('map-summary').textContent =
                total + ' facilities shown · click a marker for details';
        }

        function initLayers() {
            layerMap = {"high": feature_group_b4aa403823a9fe0a1c9f9393153c9ac0, "medium_high": feature_group_7dacb5312125c99241259234dac5d8ba, "medium": feature_group_040c7ef5953441aa61be2d2ac38cfd34, "clean": feature_group_5ae332329223d5bdce54faaefe75c116};
            leafletMap = map_bd5c83d6dfd38c4f6dcc9bc5eab90662;
            updateSummary();
        }

        function toggleTier(tier) {
            tierVisible[tier] = !tierVisible[tier];
            document.getElementById('btn-' + tier).classList.toggle('active');
            var layer = layerMap[tier];
            if (tierVisible[tier]) {
                if (!leafletMap.hasLayer(layer)) leafletMap.addLayer(layer);
            } else {
                if (leafletMap.hasLayer(layer)) leafletMap.removeLayer(layer);
            }
            updateSummary();
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initLayers, 1000);
        });
    </script>
