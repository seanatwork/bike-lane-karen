        function updateSummary() {
            var shown = Object.keys(tierVisible).filter(function(t) { return tierVisible[t]; });

        function initLayers() {
            layerMap = {"high": feature_group_9e37375a31ef58eac905cf5fb7072d8f, "medium_high": feature_group_51e13c9bb35c8eb634ed057c8095b269, "medium": feature_group_7073a240d82d0f930f020fc50794492f, "clean": feature_group_a41adc77ed19077abe440627d3c41bf6};
            leafletMap = map_cd543a904a321d5197c431839144e9a5;
            updateSummary();
        }

        function toggleTier(tier) {
            tierVisible[tier] = !tierVisible[tier];
            document.getElementById('btn-' + tier).classList.toggle('active');
            var layer = layerMap[tier];
            if (tierVisible[tier]) {
                if (!leafletMap.hasLayer(layer)) leafletMap.addLayer(layer);
            } else {
                if (leafletMap.hasLayer(layer)) leafletMap.removeLayer(layer);
            }
            updateSummary();
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initLayers, 1000);
        });
    </script>
