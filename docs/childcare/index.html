        var tierCounts = {"high": 6, "medium_high": 1, "medium": 2, "clean": 11};

        function updateSummary() {
            var shown = Object.keys(tierVisible).filter(function(t) { return tierVisible[t]; });

        }

        function initLayers() {
            layerMap = {"high": feature_group_e493980514c41adce890ec706f8d9f33, "medium_high": feature_group_df53e1012ae941e46fd81636c90b92fd, "medium": feature_group_1c26b0d9e2bb75e9863571bc35ac3379, "clean": feature_group_624f7f36967b9b0bc9afa627540c8fcb};
            leafletMap = map_8a3bfed5f9844ec156b0bad06e271f67;
            updateSummary();
        }

        function toggleTier(tier) {
            tierVisible[tier] = !tierVisible[tier];
            document.getElementById('btn-' + tier).classList.toggle('active');
            var layer = layerMap[tier];
            if (tierVisible[tier]) {
                if (!leafletMap.hasLayer(layer)) leafletMap.addLayer(layer);
            } else {
                if (leafletMap.hasLayer(layer)) leafletMap.removeLayer(layer);
            }
            updateSummary();
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initLayers, 1000);
        });
    </script>
