        var layerMap = null;
        var leafletMap = null;
        var tierCounts = {"high": 5, "medium_high": 1, "medium": 2, "clean": 11};

        function updateSummary() {
            var shown = Object.keys(tierVisible).filter(function(t) { return tierVisible[t]; });
            var total = shown.reduce(function(s, t) { return s + (tierCounts[t] || 0); }, 0);
            document.getElementById('map-summary').textContent =
                total + ' facilities shown · click a marker for details';
        }

        function initLayers() {
            layerMap = {"high": feature_group_cdf01391d827c1daa14a6d8537fb9885, "medium_high": feature_group_b13383db283a70cd017a79cfd789e8af, "medium": feature_group_c36cb429e31b6b72fb0ac41637871eff, "clean": feature_group_8e70789782f8ad8a28ac4621de7d4eba};
            leafletMap = map_3b8ed9b660c3281523af5547469b58dd;
            updateSummary();
        }

        function toggleTier(tier) {
            tierVisible[tier] = !tierVisible[tier];
            document.getElementById('btn-' + tier).classList.toggle('active');
            var layer = layerMap[tier];
            if (tierVisible[tier]) {
                if (!leafletMap.hasLayer(layer)) leafletMap.addLayer(layer);
            } else {
                if (leafletMap.hasLayer(layer)) leafletMap.removeLayer(layer);
            }
            updateSummary();
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initLayers, 1000);
        });
    </script>
