name: Refresh daily Open311 maps (bicycle, traffic, animal, homeless)

on:
  schedule:
    - cron: "0 12 * * *"  # daily at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-maps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore Open311 cache
        uses: actions/cache@v4
        with:
          path: .cache/open311_cache.db
          key: open311-daily-${{ github.run_id }}
          restore-keys: |
            open311-daily-
            open311-

      - name: Install dependencies
        run: pip install -e .

      - name: Generate bicycle map
        run: python scripts/generate_map.py bicycle
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate traffic map
        run: python scripts/generate_map.py traffic
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate animal map
        run: python scripts/generate_map.py animal
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate homeless map
        run: python scripts/generate_map.py homeless
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Save Open311 cache
        uses: actions/cache@v4
        if: always()
        with:
          path: .cache/open311_cache.db
          key: open311-daily-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit and push maps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bicycle/index.html docs/traffic/index.html docs/animal/index.html docs/homeless/index.html
          git diff --cached --quiet || git commit -m "chore: refresh daily Open311 maps [skip ci]"
          git pull --rebase origin master
          git push

      - name: Sync to unofficial repo
        run: bash sync-to-unofficial.sh
