name: Refresh parks map

on:
  # DISABLED: schedule trigger to avoid 429 errors from Open311 API
  # schedule:
  #   - cron: "0 12 * * 1"  # weekly Monday noon UTC
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate parks map
        run: python scripts/generate_map.py parks
        env:
          AUSTIN_APP_TOKEN: ${{ secrets.AUSTIN_APP_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/parks/index.html
          git diff --cached --quiet || git commit -m "chore: refresh parks map [skip ci]"
          git pull --rebase origin main
          git push
