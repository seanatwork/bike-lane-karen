name: Refresh water map

on:
  schedule:
    - cron: "0 12 * * 1"  # weekly Monday noon UTC
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate water map
        run: python scripts/generate_map.py water
        env:
          AUSTIN_APP_TOKEN: ${{ secrets.AUSTIN_APP_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/water/index.html
          git diff --cached --quiet || git commit -m "chore: refresh water map [skip ci]"
          git pull --rebase origin main
          git push
