name: Refresh all Open311 maps

on:
  # Weekly batch job for all Open311-based maps
  schedule:
    - cron: "0 12 * * 1"  # weekly Monday noon UTC
  workflow_dispatch:        # allow manual trigger from Actions tab
    inputs:
      categories:
        description: 'Categories to generate (comma-separated, or "all")'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  update-maps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore Open311 cache
        uses: actions/cache@v4
        with:
          path: .cache/open311_cache.db
          key: open311-maps-${{ github.run_id }}
          restore-keys: |
            open311-maps-
            open311-

      - name: Install dependencies
        run: pip install -e .

      - name: Generate bicycle map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'bicycle')
        run: python scripts/generate_map.py bicycle
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate graffiti map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'graffiti')
        run: python scripts/generate_map.py graffiti
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate noise map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'noise')
        run: python scripts/generate_map.py noise
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate parking map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'parking')
        run: python scripts/generate_map.py parking
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate parks map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'parks')
        run: python scripts/generate_map.py parks
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate traffic map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'traffic')
        run: python scripts/generate_map.py traffic
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate animal map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'animal')
        run: python scripts/generate_map.py animal
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Save Open311 cache
        uses: actions/cache@v4
        if: always()
        with:
          path: .cache/open311_cache.db
          key: open311-maps-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit and push all maps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bicycle/index.html docs/graffiti/index.html docs/noise/index.html docs/parking/index.html docs/parks/index.html docs/traffic/index.html docs/animal/index.html
          git diff --cached --quiet || git commit -m "chore: refresh all Open311 maps [skip ci]"
          git pull --rebase origin master
          git push

      - name: Sync to unofficial repo
        run: bash sync-to-unofficial.sh
