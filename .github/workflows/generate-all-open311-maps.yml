name: Refresh weekly Open311 maps (graffiti, noise, parking, parks, storm)

on:
  # Weekly batch job for low-frequency Open311 maps
  # (bicycle, traffic, animal, homeless run in the daily workflow instead)
  schedule:
    - cron: "0 12 * * 1"  # weekly Monday noon UTC
  workflow_dispatch:        # allow manual trigger from Actions tab
    inputs:
      categories:
        description: 'Categories to generate (comma-separated, or "all")'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  update-maps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore Open311 cache
        uses: actions/cache@v4
        with:
          path: .cache/open311_cache.db
          key: open311-maps-${{ github.run_id }}
          restore-keys: |
            open311-maps-
            open311-

      - name: Install dependencies
        run: pip install -e .

      - name: Generate graffiti map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'graffiti')
        run: python scripts/generate_map.py graffiti
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate noise map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'noise')
        run: python scripts/generate_map.py noise
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate parking map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'parking')
        run: python scripts/generate_map.py parking
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate parks map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'parks')
        run: python scripts/generate_map.py parks
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate parks hub
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'parks')
        run: python scripts/generate_map.py parks-hub
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate storm map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'storm')
        run: python scripts/generate_map.py storm
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate trees map
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'trees')
        run: python scripts/generate_map.py trees
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Save Open311 cache
        uses: actions/cache@v4
        if: always()
        with:
          path: .cache/open311_cache.db
          key: open311-maps-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit and push all maps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/graffiti/index.html docs/noise/index.html docs/parking/index.html docs/parks/index.html docs/parks/map/index.html docs/storm/index.html docs/trees/index.html
          git diff --cached --quiet || git commit -m "chore: refresh weekly Open311 maps [skip ci]"
          git pull --rebase origin main
          git push

