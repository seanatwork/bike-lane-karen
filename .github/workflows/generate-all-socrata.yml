name: Refresh all Socrata maps and trends

on:
  # Daily batch job for all Socrata-based maps and trends (fast, no rate limits)
  schedule:
    - cron: "0 14 * * *"  # daily at 14:00 UTC
  workflow_dispatch:        # allow manual trigger from Actions tab
    inputs:
      categories:
        description: 'Categories to generate (comma-separated, or "all")'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  update-socrata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate crime map
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'crime')
        run: python scripts/generate_map.py crime
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate crime trends
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'crime-trends')
        run: python scripts/generate_map.py crime-trends
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate water map
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'water')
        run: python scripts/generate_map.py water
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate childcare map
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'childcare')
        run: python scripts/generate_map.py childcare
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate budget page
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'budget')
        run: python scripts/generate_map.py budget
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate court data cache
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'court')
        run: python scripts/generate_court_data.py

      - name: Commit and push all Socrata updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/crime/index.html docs/crime/trends/index.html docs/water/index.html docs/childcare/index.html docs/budget/index.html docs/court/data.json docs/court/index.html
          git diff --cached --quiet || git commit -m "chore: refresh all Socrata maps and trends [skip ci]"
          git pull --rebase origin main
          git push

