name: Refresh all Open311 trends

on:
  # Weekly batch job for all Open311-based trends
  schedule:
    - cron: "0 13 * * 1"  # weekly Monday 13:00 UTC (1 hour after maps)
  workflow_dispatch:        # allow manual trigger from Actions tab
    inputs:
      categories:
        description: 'Trends to generate (comma-separated, or "all")'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  update-trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore Open311 cache
        uses: actions/cache@v4
        with:
          path: .cache/open311_cache.db
          key: open311-trends-${{ github.run_id }}
          restore-keys: |
            open311-trends-
            open311-maps-
            open311-

      - name: Install dependencies
        run: pip install -e .

      - name: Generate graffiti trends
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'graffiti')
        run: python scripts/generate_map.py graffiti-trends
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate noise trends
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'noise')
        run: python scripts/generate_map.py noise-trends
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate homeless trends
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'homeless')
        run: python scripts/generate_map.py homeless-trends
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Generate parking trends
        if: github.event.inputs.categories == 'all' || contains(github.event.inputs.categories, 'parking')
        run: python scripts/generate_map.py parking-trends
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Save Open311 cache
        uses: actions/cache@v4
        if: always()
        with:
          path: .cache/open311_cache.db
          key: open311-trends-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit and push all trends
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/graffiti/trends/index.html docs/noise/trends/index.html docs/homeless/trends/index.html docs/parking/trends/index.html
          git diff --cached --quiet || git commit -m "chore: refresh all Open311 trends [skip ci]"
          git pull --rebase origin main
          git push

      - name: Sync to unofficial repo
        run: bash sync-to-unofficial.sh
