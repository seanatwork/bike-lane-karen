name: Refresh budget page

on:
  schedule:
    # 15th of Jan/Apr/Jul/Oct at noon UTC — ~2 weeks after each quarter closes
    - cron: "0 12 15 1,4,7,10 *"
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate budget page
        run: python scripts/generate_budget.py
        env:
          AUSTIN_APP_TOKEN: ${{ secrets.AUSTIN_APP_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/budget/index.html
          git diff --cached --quiet || git commit -m "chore: refresh budget page [skip ci]"
          git pull --rebase origin main
          git push
