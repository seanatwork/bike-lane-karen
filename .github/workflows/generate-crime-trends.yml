name: Refresh crime trends

on:
  schedule:
    - cron: "0 13 * * 1"  # weekly Monday 13:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate crime trends
        run: python scripts/generate_map.py crime-trends
        env:
          AUSTIN_APP_TOKEN: ${{ secrets.AUSTIN_APP_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/crime/trends/index.html
          git diff --cached --quiet || git commit -m "chore: refresh crime trends [skip ci]"
          git pull --rebase origin master
          git push
