name: Refresh Fun Data (weekly)

on:
  schedule:
    - cron: "0 10 * * 0"  # weekly at 10:00 UTC on Sunday
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate-fun-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate fun data.json
        run: python scripts/generate_fun_data.py
        env:
          AUSTINAPIKEY: ${{ secrets.AUSTINAPIKEY }}

      - name: Commit and push fun data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fun/data.json
          git diff --cached --quiet || git commit -m "chore: refresh fun data (weekly) [skip ci]"
          git pull --rebase origin main
          git push