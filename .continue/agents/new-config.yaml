name: DeepSeek V4 Pro Config
version: 1.0.0
schema: v1

models:
  - name: DeepSeek V4 Pro
    provider: openai
    model: deepseek-chat
    apiKey: sk-c05a1b4d81514bc985ab9a9f79f7c47e
    apiBase: https://api.deepseek.com/v1
    roles:
      - chat
      - edit
      - apply
    contextLength: 1048576
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 8192
    requestOptions:
      timeout: 120000
  # AUTOCOMPLETE ONLY: StarCoder2 local model
  - name: StarCoder2 Autocomplete
    provider: ollama
    model: starcoder2:7b
    apiBase: http://localhost:11434
    roles:
      - autocomplete   # ONLY autocomplete, not chat

# Tell Continue to use StarCoder2 for autocomplete
tabAutocompleteModel:
  name: StarCoder2 Autocomplete
  provider: ollama

experimental:
  enableTerminalContextProvider: true
  terminalTimeout: 120000

contextProviders:
  - name: terminal
    params:
      commandTimeout: 120000
  - name: code
  - name: diff
